          - paragraph [ref=e45]: 我始终迷恋着"出发"这件事。离开熟悉的街道，去另一座城市吹不一样的风， 看另一种天色如何暗下来。作为一名视觉设计专业的学生和摄影爱好者， 镜头是我丈量世界的方式，设计则是我整理记忆的语言。
          - paragraph [ref=e46]: 这些年，国内的山海城林、海外的异域街巷，都曾留下我的脚印。 它们渐渐拼凑成我内心的版图——每一帧画面都是一段故事的开端。
